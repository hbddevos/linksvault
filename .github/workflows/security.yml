name: Security

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master
  schedule:
    # Run security scan every Monday at 8 AM UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Run PHP security check
        run: |
          composer global require sensiolabs/security-checker
          security-checker security:check --format=json || true
        continue-on-error: true

      - name: Check for known vulnerabilities in Composer packages
        run: composer audit --format=json || true
        continue-on-error: true

      - name: Run NPM audit
        run: npm audit --production || true
        continue-on-error: true

      - name: Check for exposed .env file
        run: |
          if [ -f .env ]; then
            echo "::warning::Warning: .env file detected! Make sure sensitive data is not committed."
          fi

      - name: Check file permissions
        run: |
          echo "Checking for world-writable files..."
          find . -type f -perm -o+w -not -path "./.git/*" || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            composer.lock
            package-lock.json
          retention-days: 30
