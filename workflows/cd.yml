name: CD - Continuous Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production via FTP
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql, sqlite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --no-dev

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy .env file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations (non-blocking)
        continue-on-error: true
        run: |
          echo "Attempting to run migrations..."
          if php artisan migrate --force; then
            echo "✅ Migrations executed successfully"
          else
            echo "⚠️ Migrations failed or already up-to-date - continuing deployment"
            echo "This is expected in production when no new migrations are needed"
          fi
        # env:
        #   DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
        #   DB_HOST: ${{ secrets.DB_HOST }}
        #   DB_PORT: ${{ secrets.DB_PORT }}
        #   DB_DATABASE: ${{ secrets.DB_DATABASE }}
        #   DB_USERNAME: ${{ secrets.DB_USERNAME }}
        #   DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Clear and cache configurations
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Deploy via FTP/SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **.env
            **/.github/**
            tests/**
            .DS_Store
            **/.editorconfig
            **/.gitignore
            **/phpunit.xml
            **/README.md

      # - name: Execute remote commands via SSH (for post-deployment tasks)
      #   if: ${{ secrets.SSH_HOST && secrets.SSH_HOST != '' }}
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USERNAME }}
      #     key: ${{ secrets.SSH_KEY }}
      #     port: ${{ secrets.SSH_PORT }}
      #     script: |
      #       cd ${{ secrets.FTP_REMOTE_PATH }}
            
      #       # Install dependencies on server
      #       composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --no-dev
            
      #       # Run migrations on server (non-blocking)
      #       echo "Running migrations on server..."
      #       if php artisan migrate --force; then
      #         echo "✅ Server migrations successful"
      #       else
      #         echo "⚠️ Server migrations failed or not needed - continuing"
      #       fi
            
      #       # Optimize application
      #       php artisan config:cache
      #       php artisan route:cache
      #       php artisan view:cache
      #       php artisan queue:restart
            
      #       # Restart PHP-FPM
      #       sudo systemctl restart php-fpm || sudo service php-fpm restart || echo "PHP-FPM restart skipped"

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
